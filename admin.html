<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費精算 - 管理画面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f5f6f8;
  color: #1a1a1a;
  font-size: 14px;
  line-height: 1.6;
}
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px;
  background: #1e293b;
  color: #cbd5e1;
  padding: 20px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}
.sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid #334155; margin-bottom: 16px; }
.sidebar-logo h1 { font-size: 16px; color: #fff; font-weight: 700; }
.sidebar-logo .demo-tag {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 9px; padding: 2px 8px;
  border-radius: 10px; margin-top: 6px; letter-spacing: 0.05em;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer; font-size: 13px; transition: all 0.15s;
}
.nav-item:hover { background: #334155; color: #fff; }
.nav-item.active { background: #2563eb; color: #fff; border-left: 3px solid #60a5fa; padding-left: 17px; }

.main { flex: 1; padding: 32px 40px; min-width: 0; }
.page-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-end; }
.page-title { font-size: 24px; font-weight: 700; }
.page-subtitle { font-size: 13px; color: #6b7280; margin-top: 4px; }
.btn {
  padding: 9px 18px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1e40af; }
.btn-secondary { background: #fff; color: #475569; border: 1px solid #d1d5db; }
.btn-secondary:hover { background: #f8fafc; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }
.btn-danger { background: #fff; color: #dc2626; border: 1px solid #fecaca; }
.btn-danger:hover { background: #fef2f2; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.summary-card { background: #fff; border: 1px solid #e2e5ea; border-radius: 12px; padding: 18px 20px; }
.summary-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.summary-value { font-size: 22px; font-weight: 700; margin-top: 6px; color: #1a1a1a; }
.summary-sub { font-size: 11px; color: #6b7280; margin-top: 4px; }
.summary-trend { font-size: 11px; color: #10b981; margin-top: 4px; }
.summary-trend.warning { color: #f59e0b; }

.toolbar {
  background: #fff; border: 1px solid #e2e5ea;
  border-radius: 12px 12px 0 0; padding: 14px 18px;
  border-bottom: none; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 8px 12px 8px 32px;
  border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; font-family: inherit;
}
.search-box input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.search-box::before {
  content: "🔍"; position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); font-size: 12px; opacity: 0.5;
}
.filter-chip {
  padding: 6px 12px; background: #f1f5f9; border: 1px solid #e2e5ea;
  border-radius: 16px; font-size: 12px; cursor: pointer; color: #475569;
}
.filter-chip.active { background: #dbeafe; border-color: #93c5fd; color: #1e40af; }

.table-wrap { background: #fff; border: 1px solid #e2e5ea; border-radius: 0 0 12px 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead { background: #f8fafc; }
th, td { padding: 12px 16px; text-align: left; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
tbody tr { cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: #f8fafc; }
tbody tr:last-child td { border-bottom: none; }
.num { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.balance-neg { color: #dc2626; }

.status {
  display: inline-block; padding: 3px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 600;
}
.status-pending  { background: #fef3c7; color: #92400e; }
.status-approved { background: #d1fae5; color: #065f46; }
.status-rejected { background: #fee2e2; color: #991b1b; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,23,42,0.55); z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }

/* ─── 明細詳細サブモーダル ─── */
.item-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,23,42,0.65); z-index: 200;
  align-items: center; justify-content: center;
}
.item-overlay.show { display: flex; }
.item-modal {
  background: #fff; border-radius: 16px;
  width: 96%; max-width: 760px; max-height: 90vh;
  display: flex; flex-direction: column;
  animation: slideUp 0.2s;
}
.item-modal-header {
  padding: 16px 20px; border-bottom: 1px solid #e2e5ea;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.item-modal-header h4 { font-size: 15px; font-weight: 700; }
.item-modal-body { display: flex; overflow-y: auto; flex: 1; }
.receipt-panel {
  width: 240px; flex-shrink: 0; background: #f8fafc;
  border-right: 1px solid #e2e5ea; padding: 20px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.receipt-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.receipt-slip {
  width: 180px; background: #fff;
  border: 1px solid #e2e5ea; border-radius: 4px 4px 0 0;
  padding: 14px 12px 20px; font-size: 10px; line-height: 1.7;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: relative;
}
.receipt-slip::after {
  content: ''; position: absolute; bottom: -8px; left: 0; right: 0; height: 8px;
  background: repeating-linear-gradient(-45deg, #fff 0 4px, #f8fafc 4px 8px);
}
.receipt-slip .r-shop { font-weight: 700; font-size: 11px; text-align: center; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #ccc; }
.receipt-slip .r-amount { font-size: 18px; font-weight: 700; text-align: center; margin: 8px 0; color: #1a1a1a; }
.receipt-slip .r-row { display: flex; justify-content: space-between; color: #6b7280; }
.receipt-slip .r-no { margin-top: 8px; padding-top: 6px; border-top: 1px dashed #ccc; font-size: 9px; color: #94a3b8; text-align: center; }
.receipt-upload-btn {
  width: 100%; padding: 7px; border: 1px dashed #93c5fd; border-radius: 8px;
  background: #eff6ff; color: #2563eb; font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.edit-panel { flex: 1; padding: 20px; overflow-y: auto; }
.edit-field { margin-bottom: 14px; }
.edit-field label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
.edit-field input, .edit-field select, .edit-field textarea {
  width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px;
  font-size: 13px; font-family: inherit; background: #fff;
}
.edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus {
  outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.edit-field textarea { resize: vertical; min-height: 64px; }
.edit-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.item-modal-footer {
  padding: 14px 20px; border-top: 1px solid #e2e5ea;
  display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0;
}
.items-table tbody tr { cursor: pointer; }
.items-table tbody tr:hover { background: #eff6ff; }

.modal {
  background: #fff; border-radius: 16px;
  width: 96%; max-width: 860px; max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.25s;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid #e2e5ea;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.modal-header h3 { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; padding: 4px; }
.modal-body { padding: 20px 24px; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.info-item { }
.info-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.info-value { font-size: 14px; font-weight: 600; }

.budget-bar-wrap { background: #f1f5f9; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; }
.budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
.budget-bar { height: 8px; background: #e2e5ea; border-radius: 4px; overflow: hidden; }
.budget-fill { height: 100%; background: #2563eb; border-radius: 4px; transition: width 0.5s; }
.budget-fill.over { background: #dc2626; }

.items-title { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 10px; }
.items-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.items-table th {
  background: #f8fafc; padding: 8px 10px; text-align: left;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: #6b7280; border-bottom: 2px solid #e2e5ea;
}
.items-table td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
.items-table tr:last-child td { border-bottom: none; }
.items-table .total-row td { font-weight: 700; background: #f8fafc; border-top: 2px solid #e2e5ea; }
.cat-badge {
  display: inline-block; padding: 2px 8px; border-radius: 8px;
  background: #eff6ff; color: #1e40af; font-size: 10px; font-weight: 600;
}
.invoice-none { color: #94a3b8; font-style: italic; }

.modal-footer {
  padding: 16px 24px; border-top: 1px solid #e2e5ea;
  display: flex; justify-content: flex-end; gap: 8px;
  position: sticky; bottom: 0; background: #fff;
}

@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .main { padding: 20px; }
  .info-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>経費精算</h1>
      <span class="demo-tag">DEMO v0.2</span>
    </div>
    <div class="nav-item active">📋 案件一覧</div>
    <div class="nav-item">✅ 承認待ち</div>

  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">案件一覧</h1>
        <p class="page-subtitle" id="page-subtitle">2026年4月分</p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="btn-csv">📥 CSV出力</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">承認待ち案件</div>
        <div class="summary-value" id="dash-pending">—</div>
        <div class="summary-trend warning" id="dash-pending-trend">⏳ 要対応</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">承認済み精算合計</div>
        <div class="summary-value" id="dash-settled">—</div>
        <div class="summary-trend">承認済み案件の合計</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">予算合計</div>
        <div class="summary-value" id="dash-budget">—</div>
        <div class="summary-sub" id="dash-budget-sub">全案件合算</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">平均予算消化率</div>
        <div class="summary-value" id="dash-rate">—</div>
        <div class="summary-trend">承認済み案件の平均</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box"><input type="text" id="search-input" placeholder="案件名・帳合No.・申請者で検索..."></div>
      <div class="filter-chip active" data-filter="すべて">すべて</div>
      <div class="filter-chip" data-filter="承認待ち">承認待ち</div>
      <div class="filter-chip" data-filter="承認済み">承認済み</div>
      <div class="filter-chip" data-filter="差し戻し">差し戻し</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>案件名</th>
            <th>帳合No.</th>
            <th>申請者</th>
            <th class="num">予算額</th>
            <th class="num">精算額</th>
            <th class="num">残高</th>
            <th>提出日</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">案件詳細</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger"   id="btn-reject"  onclick="rejectItem()">差し戻す</button>
      <button class="btn btn-success"  id="btn-approve" onclick="approveItem()">✓ 承認する</button>
    </div>
  </div>
</div>

<!-- 明細詳細サブモーダル -->
<div class="item-overlay" id="item-modal">
  <div class="item-modal">
    <div class="item-modal-header">
      <h4 id="item-modal-title">明細詳細・修正</h4>
      <button class="modal-close" onclick="closeItemModal()">✕</button>
    </div>
    <div class="item-modal-body">
      <div class="receipt-panel">
        <div class="receipt-label">領収書画像</div>
        <div class="receipt-slip" id="receipt-slip-preview"></div>
        <div class="receipt-upload-btn">📎 画像を差し替える</div>
      </div>
      <div class="edit-panel">
        <div class="edit-row-2">
          <div class="edit-field">
            <label>月日</label>
            <input type="text" id="edit-monthDay" placeholder="10/21">
          </div>
          <div class="edit-field">
            <label>レシートNo.</label>
            <input type="text" id="edit-receiptNo" placeholder="1">
          </div>
        </div>
        <div class="edit-field">
          <label>科目グループ</label>
          <select id="edit-category"></select>
        </div>
        <div class="edit-field">
          <label>摘要</label>
          <textarea id="edit-description" rows="3"></textarea>
        </div>
        <div class="edit-row-2">
          <div class="edit-field">
            <label>金額（円）</label>
            <input type="number" id="edit-amount" min="0">
          </div>
          <div class="edit-field">
            <label>税率</label>
            <select id="edit-tax">
              <option>10%</option>
              <option>8%軽減</option>
              <option>非課税</option>
            </select>
          </div>
        </div>
        <div class="edit-field">
          <label>インボイス番号</label>
          <input type="text" id="edit-invoice" placeholder="T1234567890123">
        </div>
      </div>
    </div>
    <div class="item-modal-footer">
      <button class="btn btn-secondary" onclick="closeItemModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveItemModal()">✓ 保存する</button>
    </div>
  </div>
</div>

const statusLabel = { pending: '承認待ち', approved: '承認済み', rejected: '差し戻し' };
const statusClass  = { pending: 'status-pending', approved: 'status-approved', rejected: 'status-rejected' };

let currentFilter = 'すべて';
let currentSearch  = '';
let currentOpenId  = null;
let currentItemIdx = null;

const CATEGORIES_ADMIN = ['会議費','旅費交通費①','旅費交通費②','車両費','制作諸経費','通信費','郵便・宅急便代','その他'];

// ===================== フィルタ =====================
function getFiltered() {
  const q = currentSearch.trim().toLowerCase();
  return dummyProjects.filter(p => {
    const matchStatus = currentFilter === 'すべて' || statusLabel[p.status] === currentFilter;
    const matchSearch = !q || [p.projectName, p.ledgerNo, p.applicant].some(v => v.toLowerCase().includes(q));
    return matchStatus && matchSearch;
  });
}

// ===================== ダッシュボード =====================
function updateDashboard() {
  const pending  = dummyProjects.filter(p => p.status === 'pending').length;
  const approved = dummyProjects.filter(p => p.status === 'approved');
  const allBudget = dummyProjects.reduce((s, p) => s + p.budget, 0);
  const settledTotal = approved.reduce((s, p) => s + p.settled, 0);
  const rates = approved.map(p => Math.round(p.settled / p.budget * 100));
  const avgRate = rates.length ? Math.round(rates.reduce((a, b) => a + b, 0) / rates.length) : 0;

  document.getElementById('dash-pending').textContent  = `${pending}件`;
  document.getElementById('dash-settled').textContent  = `¥${settledTotal.toLocaleString()}`;
  document.getElementById('dash-budget').textContent   = `¥${allBudget.toLocaleString()}`;
  document.getElementById('dash-rate').textContent     = approved.length ? `${avgRate}%` : '—';

  const trendEl = document.getElementById('dash-pending-trend');
  trendEl.textContent = pending > 0 ? '⏳ 要対応' : '✅ すべて完了';
  trendEl.className   = `summary-trend ${pending > 0 ? 'warning' : ''}`;
}

// ===================== テーブル描画 =====================
function renderTable() {
  const data  = getFiltered();
  const tbody = document.getElementById('rows');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:#6b7280;">該当する案件がありません</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(p => {
    const balance    = p.budget - p.settled;
    const balanceCls = balance < 0 ? ' balance-neg' : '';
    const rate       = Math.round(p.settled / p.budget * 100);
    return `
    <tr data-id="${p.id}">
      <td><strong>${p.projectName}</strong></td>
      <td style="color:#6b7280;font-size:12px;">${p.ledgerNo}</td>
      <td>${p.applicant}</td>
      <td class="num">¥${p.budget.toLocaleString()}</td>
      <td class="num">¥${p.settled.toLocaleString()} <span style="font-size:10px;color:#6b7280;">(${rate}%)</span></td>
      <td class="num${balanceCls}">¥${balance.toLocaleString()}</td>
      <td style="color:#6b7280;">${p.date}</td>
      <td><span class="status ${statusClass[p.status]}">${statusLabel[p.status]}</span></td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => openModal(tr.dataset.id));
  });
}

function openItemModal(projectId, itemIdx) {
  const p  = dummyProjects.find(d => d.id === projectId);
  const it = p.items[itemIdx];
  currentItemIdx = itemIdx;

  document.getElementById('item-modal-title').textContent =
    `明細詳細・修正（No.${it.receiptNo !== '' ? it.receiptNo : '—'} ／ ${it.monthDay || '日付なし'}）`;

  const taxRate = it.tax === '8%軽減' ? 8/108 : it.tax === '10%' ? 10/110 : 0;
  document.getElementById('receipt-slip-preview').innerHTML = `
    <div class="r-shop">${it.category}</div>
    <div class="r-amount">¥${it.amount.toLocaleString()}</div>
    <div class="r-row"><span>日付</span><span>${it.monthDay || '—'}</span></div>
    <div class="r-row"><span>税率</span><span>${it.tax}</span></div>
    <div class="r-row"><span>内税</span><span>¥${Math.round(it.amount * taxRate).toLocaleString()}</span></div>
    <div class="r-no">No.${it.receiptNo !== '' ? it.receiptNo : '—'}</div>
  `;

  document.getElementById('edit-monthDay').value    = it.monthDay;
  document.getElementById('edit-receiptNo').value   = it.receiptNo;
  document.getElementById('edit-description').value = it.description;
  document.getElementById('edit-amount').value      = it.amount;
  document.getElementById('edit-invoice').value     = it.invoice;

  const catSel = document.getElementById('edit-category');
  catSel.innerHTML = CATEGORIES_ADMIN.map(c =>
    `<option value="${c}" ${c === it.category ? 'selected' : ''}>${c}</option>`
  ).join('');

  const taxSel = document.getElementById('edit-tax');
  [...taxSel.options].forEach(o => { o.selected = o.value === it.tax; });

  document.getElementById('item-modal').classList.add('show');
}

function closeItemModal() {
  document.getElementById('item-modal').classList.remove('show');
  currentItemIdx = null;
}

  it.receiptNo   = document.getElementById('edit-receiptNo').value;
  it.category    = document.getElementById('edit-category').value;
  it.description = document.getElementById('edit-description').value;
  it.amount      = parseFloat(document.getElementById('edit-amount').value) || 0;
  it.tax         = document.getElementById('edit-tax').value;
  it.invoice     = document.getElementById('edit-invoice').value;
  closeItemModal();
  openModal(currentOpenId);
}

function approveItem() {
  const p = dummyProjects.find(d => d.id === currentOpenId);
  if (p) p.status = 'approved';
  closeModal();
  updateDashboard();
  renderTable();
}

function rejectItem() {
  const p = dummyProjects.find(d => d.id === currentOpenId);
  if (p) p.status = 'rejected';
  closeModal();
  updateDashboard();
  renderTable();
}

// ===================== CSV出力 =====================
document.getElementById('btn-csv').addEventListener('click', () => {
  const headers = ['案件名', '帳合No.', '申請者', '提出日', '予算額', '精算額', '残高', '科目グループ', '摘要', '金額', '税率', 'インボイス番号', '状態'];
  const rows = [];
  dummyProjects.forEach(p => {
    const balance = p.budget - p.settled;
    if (p.items.length === 0) {
      rows.push([p.projectName, p.ledgerNo, p.applicant, p.date, p.budget, p.settled, balance, '', '', '', '', '', statusLabel[p.status]]);
    } else {
      p.items.forEach((it, i) => {
        rows.push([
          i === 0 ? p.projectName : '',
          i === 0 ? p.ledgerNo   : '',
          i === 0 ? p.applicant  : '',
          i === 0 ? p.date       : '',
          i === 0 ? p.budget     : '',
          i === 0 ? p.settled    : '',
          i === 0 ? balance      : '',
          it.category, it.description, it.amount, it.tax, it.invoice, i === 0 ? statusLabel[p.status] : ''
        ]);
      });
    }
  });
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const bom  = '﻿';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = '精算データ_2026-04.csv'; a.click();
  URL.revokeObjectURL(url);
});

// ===================== イベント =====================
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

document.getElementById('search-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderTable();
});

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderTable();
  });
});

document.getElementById('nav-to-index').addEventListener('click', () => { window.location.href = 'index.html'; });

// ===================== 初期描画 =====================
updateDashboard();
renderTable();
</script>
