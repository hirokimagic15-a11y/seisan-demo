<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現金出納帳 - 経費精算</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f5f6f8;
  color: #1a1a1a;
  font-size: 14px;
  line-height: 1.6;
}
.layout { display: flex; min-height: 100vh; }

/* ===== サイドバー ===== */
.sidebar {
  width: 220px;
  background: #1e293b;
  color: #cbd5e1;
  padding: 20px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}
.sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid #334155; margin-bottom: 16px; }
.sidebar-logo h1 { font-size: 16px; color: #fff; font-weight: 700; }
.sidebar-logo .demo-tag {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 9px; padding: 2px 8px;
  border-radius: 10px; margin-top: 6px; letter-spacing: 0.05em;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer; font-size: 13px; transition: all 0.15s;
}
.nav-item:hover { background: #334155; color: #fff; }
.nav-item.active { background: #2563eb; color: #fff; border-left: 3px solid #60a5fa; padding-left: 17px; }
.nav-item.disabled { color: #475569; cursor: default; }
.nav-item.disabled:hover { background: transparent; color: #475569; }
.nav-divider { border-top: 1px solid #334155; margin: 12px 0; }

/* ===== メイン ===== */
.main { flex: 1; padding: 32px 40px; min-width: 0; }
.page-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-end; }
.page-title { font-size: 24px; font-weight: 700; }
.page-subtitle { font-size: 13px; color: #6b7280; margin-top: 4px; }

/* ===== ボタン ===== */
.btn {
  padding: 9px 18px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1e40af; }
.btn-secondary { background: #fff; color: #475569; border: 1px solid #d1d5db; }
.btn-secondary:hover { background: #f8fafc; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }

/* ===== サマリーカード ===== */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.summary-card { background: #fff; border: 1px solid #e2e5ea; border-radius: 12px; padding: 18px 20px; }
.summary-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.summary-value { font-size: 22px; font-weight: 700; margin-top: 6px; color: #1a1a1a; }
.summary-sub { font-size: 11px; color: #6b7280; margin-top: 4px; }

/* ===== ツールバー ===== */
.toolbar {
  background: #fff; border: 1px solid #e2e5ea;
  border-radius: 12px 12px 0 0; padding: 14px 18px;
  border-bottom: none; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.filter-chip {
  padding: 6px 14px; background: #f1f5f9; border: 1px solid #e2e5ea;
  border-radius: 16px; font-size: 12px; cursor: pointer; color: #475569; transition: all 0.15s;
}
.filter-chip.active { background: #dbeafe; border-color: #93c5fd; color: #1e40af; font-weight: 600; }
.filter-sep { width: 1px; height: 20px; background: #e2e5ea; margin: 0 4px; }
.select-field {
  padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 8px;
  font-size: 12px; font-family: inherit; background: #fff; color: #374151; cursor: pointer;
}
.select-field:focus { outline: none; border-color: #2563eb; }

/* ===== テーブル ===== */
.table-wrap { background: #fff; border: 1px solid #e2e5ea; border-radius: 0 0 12px 12px; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: #f8fafc; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f1f5f9; }
th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; white-space: nowrap; }
tbody tr { cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: #f8fafc; }
tbody tr.selected { background: #eff6ff; }
tbody tr:last-child td { border-bottom: none; }
.num { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.balance-col { text-align: right; font-weight: 700; color: #1e40af; }
.tax-col { font-size: 11px; color: #6b7280; }
.desc-col { font-size: 12px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inv-col { font-size: 11px; }
.inv-col.tekikaku { color: #065f46; font-weight: 700; }
.inv-col.kubun { color: #92400e; }
.opening-row td { background: #fafaf7; font-style: italic; color: #6b7280; }
.total-row td { background: #1e293b; color: #fff; font-weight: 700; border-color: #334155; }
.total-row td.num { color: #93c5fd; }
.total-row td.balance-col { color: #6ee7b7; }
.tax8-stripe { background: #fffbeb !important; }

/* ===== ステータスバッジ ===== */
.status {
  display: inline-block; padding: 3px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.status-approved { background: #d1fae5; color: #065f46; }
.status-yayoi    { background: #e0e7ff; color: #3730a3; }
.status-rejected { background: #fee2e2; color: #991b1b; }
.status-pending  { background: #fef3c7; color: #92400e; }

/* ===== モーダル ===== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,23,42,0.55); z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 16px;
  width: 96%; max-width: 680px; max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.25s;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid #e2e5ea;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.modal-header h3 { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; padding: 4px; }
.modal-body { padding: 20px 24px; }
.modal-body p { margin-bottom: 14px; font-size: 14px; color: #374151; }
.modal-footer {
  padding: 16px 24px; border-top: 1px solid #e2e5ea;
  display: flex; justify-content: flex-end; gap: 8px;
  position: sticky; bottom: 0; background: #fff;
}

/* モーダル内テーブル */
.confirm-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
.confirm-table th {
  background: #f8fafc; padding: 8px 10px; text-align: left;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: #6b7280; border-bottom: 2px solid #e2e5ea;
}
.confirm-table td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
.confirm-table tr:last-child td { border-bottom: none; }
.confirm-table td.num { text-align: right; font-weight: 600; color: #1e40af; }

/* 税額サマリー */
.tax-summary-box {
  background: #f8fafc; border: 1px solid #e2e5ea; border-radius: 10px;
  padding: 14px 16px; font-size: 13px; line-height: 2;
}
.tax-summary-box .total-line { font-size: 15px; font-weight: 700; color: #1a1a1a; }

/* ===== 成功通知トースト ===== */
.success-toast {
  display: none; position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  background: #10b981; color: #fff; padding: 12px 24px;
  border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 200;
  box-shadow: 0 8px 24px rgba(16,185,129,0.35);
  animation: toastIn 0.3s;
}
.success-toast.show { display: block; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .main { padding: 20px; }
}
</style>
</head>
<body>

<div class="layout">
  <!-- ===== サイドバー ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>現金出納帳</h1>
      <span class="demo-tag">弥生会計 第28期</span>
    </div>
    <div class="nav-item active">💴 現金出納帳</div>
    <div class="nav-item disabled">📒 普通預金出納帳</div>
    <div class="nav-item disabled">📊 残高試算表</div>
    <div class="nav-item disabled">📈 損益計算書</div>
    <div class="nav-divider"></div>
    <div class="nav-item" onclick="window.location.href='admin.html'">← 精算管理に戻る</div>
    <div class="nav-item" onclick="window.location.href='index.html'">📝 申請フォームへ</div>
  </aside>

  <!-- ===== メイン ===== -->
  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">現金出納帳</h1>
        <p class="page-subtitle">第28期（令和07年10月01日〜令和08年09月30日）</p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="btn-csv-export">📥 CSV出力</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨 印刷</button>
        <button class="btn btn-success" id="btn-register-yayoi">✓ 弥生会計に反映する</button>
      </div>
    </div>

    <!-- サマリーカード -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">前月繰越残高</div>
        <div class="summary-value">¥696,429</div>
        <div class="summary-sub">開始残高</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">当期支出合計</div>
        <div class="summary-value" id="period-expense" style="color:#dc2626;">—</div>
        <div class="summary-sub" id="header-count">件数：—</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">現在残高</div>
        <div class="summary-value" id="closing-balance" style="color:#2563eb;">—</div>
        <div class="summary-sub">前月残高 − 支出</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">伝票数</div>
        <div class="summary-value" id="sb-count">—</div>
        <div class="summary-sub" id="header-total">支出合計：—</div>
      </div>
    </div>

    <!-- ツールバー -->
    <div class="toolbar">
      <span class="filter-chip active" id="chip-all" onclick="setGroupView('all')">明細ビュー（全件）</span>
      <span class="filter-chip" id="chip-summary" onclick="setGroupView('summary')">集計ビュー（簡略化）</span>
      <div class="filter-sep"></div>
      <button class="btn btn-secondary" id="btn-filter-all" onclick="setFilter('all')" style="padding:6px 14px;font-size:12px;">すべての案件</button>
      <button class="btn btn-secondary" id="btn-filter-approved" onclick="setFilter('approved')" style="padding:6px 14px;font-size:12px;">承認済みのみ</button>
      <div class="filter-sep"></div>
      <span style="font-size:12px;color:#6b7280;">集計期間：</span>
      <select class="select-field" id="period-select" onchange="renderLedger()">
        <option value="all">全期間</option>
        <option value="2026-04">2026年4月</option>
        <option value="2025-10">2025年10月</option>
        <option value="2025-12">2025年12月</option>
        <option value="2026-02">2026年2月</option>
        <option value="2026-03">2026年3月</option>
      </select>
      <span style="font-size:12px;color:#6b7280;">部門：</span>
      <select class="select-field" id="dept-select" onchange="renderLedger()">
        <option value="all">全部門</option>
        <option value="制作課">制作課</option>
        <option value="撮影課">撮影課</option>
        <option value="企画制作課">企画制作課</option>
        <option value="管理部">管理部</option>
      </select>
    </div>

    <!-- テーブル -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-header-row"></tr>
        </thead>
        <tbody id="ledger-body"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ===== 成功トースト ===== -->
<div class="success-toast" id="success-toast"></div>

<!-- ===== 確認モーダル ===== -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>弥生会計への入力確認</h3>
      <button class="modal-close" onclick="closeConfirmModal()">✕</button>
    </div>
    <div class="modal-body" id="confirm-modal-content"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirmModal()">キャンセル</button>
      <button class="btn btn-success" onclick="registerToYayoi()">✓ 弥生会計に反映する</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// localStorage ユーティリティ
// ============================================================
const STORAGE_KEY = 'seisanData';
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { seeded: false, projects: [], lastYayoiAt: null };
  } catch { return { seeded: false, projects: [], lastYayoiAt: null }; }
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ============================================================
// 科目マッピング（精算書 → 弥生科目）
// ============================================================
const CATEGORY_MAP = {
  '会議費':      '[製]会議費',
  '旅費交通費①': '[製]旅費交通費',
  '旅費交通費②': '[製]旅費交通費',
  '車両費':      '車両費',
  '制作諸経費':  '[製]制作諸経費',
  '消耗品費':    '[製]消耗品費',
  '事務用品代':  '事務用品費',
  '通信費':      '通信費',
  '荷造り運賃発送費': '荷造運搬費',
  'その他':      '雑費',
};

// 税区分マッピング
const TAX_MAP = {
  '10%':   { kubun: '課対仕入10%', keisan: '内税', rate: 10/110 },
  '8%軽減': { kubun: '課対仕入8%（軽）', keisan: '内税', rate: 8/108 },
  '非課税': { kubun: '非課税仕入', keisan: '—', rate: 0 },
};

// ステータスラベル
const STATUS_LABEL = { pending: '承認待ち', approved: '承認済み', rejected: '差し戻し', yayoi_registered: '弥生登録済' };
const STATUS_CLASS  = { approved: 'status-approved', yayoi_registered: 'status-yayoi', rejected: 'status-rejected', pending: 'status-pending' };

// ============================================================
// 状態
// ============================================================
let currentFilter = 'all';
let currentGroupView = 'all';
const OPENING_BALANCE = 696429;

// ============================================================
// データ集約（精算明細書簡略化と同じルール）
// ============================================================
function aggregateItems(projects) {
  const groups = new Map();
  projects.forEach(p => {
    p.items.forEach(it => {
      const hasInvoice = it.invoice ? 'あり' : 'なし';
      const key = `${p.id}|${it.category}|${it.tax}|${hasInvoice}`;
      if (!groups.has(key)) {
        groups.set(key, { project: p, category: it.category, tax: it.tax, hasInvoice, items: [] });
      }
      groups.get(key).items.push(it);
    });
  });

  const rows = [];
  groups.forEach(g => {
    const p = g.project;
    const total = g.items.reduce((s, it) => s + (it.amount || 0), 0);
    const taxInfo = TAX_MAP[g.tax] || TAX_MAP['10%'];
    const taxAmt = Math.round(total * taxInfo.rate);
    const dates = g.items.map(it => it.monthDay).filter(Boolean);
    const dateRange = dates.length > 0
      ? (dates[0] === dates[dates.length-1] ? dates[0] : `${dates[0]}〜${dates[dates.length-1]}`)
      : '—';

    const contentDesc = g.category === '旅費交通費②' ? '宿泊代'
      : g.category === '旅費交通費①' ? '交通費'
      : g.category === '会議費'       ? '飲食代'
      : g.category === '車両費'       ? '車両費'
      : g.category === '制作諸経費'   ? '制作諸経費'
      : g.category;
    const summary = `${dateRange}${contentDesc}（${p.projectName} ${p.ledgerNo}）/${p.applicant}`;
    const invoice   = g.hasInvoice === 'あり' ? '適格' : '区分記載';
    const deduction = g.hasInvoice === 'あり' ? '100%' : '80%経過措置';

    rows.push({
      project: p, category: g.category,
      yayoiSubj: CATEGORY_MAP[g.category] || g.category,
      tax: g.tax, taxKubun: taxInfo.kubun, taxKeisan: taxInfo.keisan,
      taxAmt, total, dateRange, summary, invoice, deduction,
      itemCount: g.items.length,
    });
  });
  return rows;
}

// ============================================================
// フィルタ
// ============================================================
function setFilter(f) {
  currentFilter = f;
  const btnAll      = document.getElementById('btn-filter-all');
  const btnApproved = document.getElementById('btn-filter-approved');
  btnAll.style.background      = f === 'all'      ? '#dbeafe' : '';
  btnAll.style.color           = f === 'all'      ? '#1e40af' : '';
  btnAll.style.borderColor     = f === 'all'      ? '#93c5fd' : '';
  btnApproved.style.background = f === 'approved' ? '#dbeafe' : '';
  btnApproved.style.color      = f === 'approved' ? '#1e40af' : '';
  btnApproved.style.borderColor= f === 'approved' ? '#93c5fd' : '';
  renderLedger();
}

function setGroupView(v) {
  currentGroupView = v;
  document.getElementById('chip-all').classList.toggle('active',    v === 'all');
  document.getElementById('chip-summary').classList.toggle('active', v === 'summary');
  renderLedger();
}

function getFilteredProjects() {
  let ps = loadData().projects.filter(p => p.status === 'approved' || p.status === 'yayoi_registered');
  if (currentFilter === 'approved') ps = ps.filter(p => p.status === 'approved');
  const dept = document.getElementById('dept-select').value;
  if (dept !== 'all') ps = ps.filter(p => p.dept === dept);
  return ps;
}

// ============================================================
// テーブル描画
// ============================================================
function renderLedger() {
  const projects = getFilteredProjects();

  const headerRow = document.getElementById('table-header-row');
  headerRow.innerHTML = `
    <th style="width:44px;text-align:center;">No.</th>
    <th style="width:64px;">部門</th>
    <th style="width:120px;">相手勘定科目</th>
    <th style="width:130px;">税区分</th>
    <th style="width:88px;" class="num">支出金額</th>
    <th style="width:72px;" class="num">貸方税額</th>
    <th style="width:96px;" class="num">残高</th>
    <th>摘要</th>
    <th style="width:68px;">請求書区分</th>
    <th style="width:80px;">仕入控除</th>
    <th style="width:76px;">状態</th>
  `;

  const tbody = document.getElementById('ledger-body');
  let rows = [];

  if (currentGroupView === 'summary') {
    rows = aggregateItems(projects);
  } else {
    projects.forEach(p => {
      p.items.forEach(it => {
        const taxInfo = TAX_MAP[it.tax] || TAX_MAP['10%'];
        const taxAmt  = Math.round((it.amount || 0) * taxInfo.rate);
        const hasInv  = it.invoice ? 'あり' : 'なし';
        rows.push({
          project: p, category: it.category,
          yayoiSubj: CATEGORY_MAP[it.category] || it.category,
          tax: it.tax, taxKubun: taxInfo.kubun, taxKeisan: taxInfo.keisan,
          taxAmt, total: it.amount || 0, dateRange: it.monthDay || '—',
          summary: `${it.monthDay || ''}${it.description}（${p.projectName} ${p.ledgerNo}）/${p.applicant}`,
          invoice:   hasInv === 'あり' ? '適格' : '区分記載',
          deduction: hasInv === 'あり' ? '100%' : '80%経過措置',
          itemCount: 1,
        });
      });
    });
  }

  const totalExpense = rows.reduce((s, r) => s + r.total, 0);
  let balance = OPENING_BALANCE;

  document.getElementById('header-count').textContent  = `件数：${rows.length}件`;
  document.getElementById('header-total').textContent  = `支出合計：¥${totalExpense.toLocaleString()}`;
  document.getElementById('sb-count').textContent      = `${rows.length}件`;
  document.getElementById('period-expense').textContent = `¥${totalExpense.toLocaleString()}`;
  document.getElementById('closing-balance').textContent = `¥${(OPENING_BALANCE - totalExpense).toLocaleString()}`;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:32px;color:#6b7280;">表示するデータがありません<br><span style="font-size:12px;">管理画面で案件を承認するとここに表示されます</span></td></tr>`;
    return;
  }

  // 前月残高行
  let html = `<tr class="opening-row">
    <td style="text-align:center;font-size:12px;">—</td>
    <td></td>
    <td colspan="2" style="color:#6b7280;">前月繰越</td>
    <td class="num"></td><td class="num"></td>
    <td class="balance-col">¥${OPENING_BALANCE.toLocaleString()}</td>
    <td colspan="4" style="color:#9ca3af;font-size:11px;">前期繰越残高</td>
  </tr>`;

  rows.forEach((r, i) => {
    balance -= r.total;
    const statusBadge = `<span class="status ${STATUS_CLASS[r.project.status] || 'status-pending'}">${STATUS_LABEL[r.project.status] || r.project.status}</span>`;
    const invClass    = r.invoice === '適格' ? 'tekikaku' : 'kubun';
    const is8k        = r.tax === '8%軽減';

    html += `<tr data-idx="${i}"${is8k ? ' class="tax8-stripe"' : ''}>
      <td style="text-align:center;font-size:12px;color:#6b7280;">${i + 1}</td>
      <td style="font-size:11px;color:#6b7280;">${r.project.dept || '—'}</td>
      <td style="font-size:12px;">${r.yayoiSubj}</td>
      <td class="tax-col">${r.taxKubun} / ${r.taxKeisan}</td>
      <td class="num">¥${r.total.toLocaleString()}</td>
      <td class="num" style="color:#6b7280;font-size:12px;">¥${r.taxAmt.toLocaleString()}</td>
      <td class="balance-col">¥${balance.toLocaleString()}</td>
      <td class="desc-col" title="${r.summary}">${r.summary}</td>
      <td class="inv-col ${invClass}">${r.invoice}</td>
      <td class="inv-col" style="font-size:11px;">${r.deduction}</td>
      <td>${statusBadge}</td>
    </tr>`;
  });

  // 合計行
  const totalTax = rows.reduce((s, r) => s + r.taxAmt, 0);
  html += `<tr class="total-row">
    <td colspan="4" style="text-align:center;letter-spacing:0.1em;">合　計</td>
    <td class="num">¥${totalExpense.toLocaleString()}</td>
    <td class="num">¥${totalTax.toLocaleString()}</td>
    <td class="balance-col">¥${(OPENING_BALANCE - totalExpense).toLocaleString()}</td>
    <td colspan="4"></td>
  </tr>`;

  tbody.innerHTML = html;

  tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
    tr.addEventListener('click', () => {
      tbody.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
      tr.classList.add('selected');
    });
  });
}

// ============================================================
// CSV出力（弥生インポート形式）
// ============================================================
document.getElementById('btn-csv-export').addEventListener('click', () => {
  const projects = getFilteredProjects();
  const rows = currentGroupView === 'summary'
    ? aggregateItems(projects)
    : (() => {
        const r = [];
        projects.forEach(p => p.items.forEach(it => {
          const taxInfo = TAX_MAP[it.tax] || TAX_MAP['10%'];
          const taxAmt  = Math.round((it.amount||0) * taxInfo.rate);
          const hasInv  = it.invoice ? 'あり' : 'なし';
          r.push({
            project: p, category: it.category,
            yayoiSubj: CATEGORY_MAP[it.category] || it.category,
            tax: it.tax, taxKubun: taxInfo.kubun, taxKeisan: taxInfo.keisan,
            taxAmt, total: it.amount||0, dateRange: it.monthDay||'',
            summary: `${it.monthDay||''}${it.description}（${p.projectName} ${p.ledgerNo}）/${p.applicant}`,
            invoice:   hasInv === 'あり' ? '適格' : '区分記載',
            deduction: hasInv === 'あり' ? '100%' : '80%経過措置',
          });
        }));
        return r;
      })();

  const headers = ['伝票No.','部門','相手勘定科目','税区分','税計算区分','支出金額','貸方税額','摘要','請求書区分','仕入税額控除','案件名','帳合No.','申請者','状態'];
  const csvRows = rows.map((r, i) => [
    i+1, r.project.dept, r.yayoiSubj, r.taxKubun, r.taxKeisan,
    r.total, r.taxAmt, r.summary, r.invoice, r.deduction,
    r.project.projectName, r.project.ledgerNo, r.project.applicant,
    STATUS_LABEL[r.project.status] || r.project.status,
  ]);
  const csv  = [headers, ...csvRows].map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = '弥生現金出納帳.csv'; a.click();
  URL.revokeObjectURL(url);
});

// ============================================================
// 確認モーダル
// ============================================================
function showConfirmModal() {
  const approvedProjects = loadData().projects.filter(p => p.status === 'approved');
  if (approvedProjects.length === 0) {
    alert('弥生会計に反映する承認済み案件がありません。\n管理画面で案件を承認してください。');
    return;
  }
  const rows        = aggregateItems(approvedProjects);
  const totalExpense = rows.reduce((s, r) => s + r.total, 0);
  const tax10       = rows.filter(r => r.tax === '10%').reduce((s, r) => s + r.taxAmt, 0);
  const tax8        = rows.filter(r => r.tax === '8%軽減').reduce((s, r) => s + r.taxAmt, 0);

  const tableHtml = rows.map((r, i) => `
    <tr>
      <td style="text-align:center;color:#6b7280;">${i+1}</td>
      <td>${r.yayoiSubj}</td>
      <td class="num">¥${r.total.toLocaleString()}</td>
      <td class="num">¥${r.taxAmt.toLocaleString()}</td>
      <td style="font-size:11px;color:#6b7280;">${r.taxKubun}</td>
      <td style="font-size:11px;color:#6b7280;max-width:160px;overflow:hidden;text-overflow:ellipsis;">${r.summary}</td>
    </tr>
  `).join('');

  document.getElementById('confirm-modal-content').innerHTML = `
    <p>以下の <strong>${approvedProjects.length}件</strong> の案件（<strong>${rows.length}行</strong>）を弥生会計（現金出納帳）に反映します。</p>
    <table class="confirm-table">
      <thead><tr>
        <th style="width:32px;">No.</th><th>科目</th>
        <th style="width:88px;">支出金額</th><th style="width:72px;">貸方税額</th>
        <th style="width:110px;">税区分</th><th>摘要</th>
      </tr></thead>
      <tbody>${tableHtml}</tbody>
    </table>
    <div class="tax-summary-box">
      <div class="total-line">合計支出金額：¥${totalExpense.toLocaleString()}</div>
      <div style="font-size:12px;color:#6b7280;margin-top:4px;">
        うち消費税10%：¥${tax10.toLocaleString()}　／　うち消費税8%軽減：¥${tax8.toLocaleString()}
      </div>
    </div>
  `;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirmModal() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

function registerToYayoi() {
  const data    = loadData();
  const targets = data.projects.filter(p => p.status === 'approved');
  targets.forEach(p => { p.status = 'yayoi_registered'; });
  data.lastYayoiAt = new Date().toISOString();
  saveData(data);
  closeConfirmModal();

  const toast = document.getElementById('success-toast');
  toast.textContent = `✓ ${targets.length}件を弥生会計（現金出納帳）に反映しました（${new Date().toLocaleString('ja-JP')}）`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 5000);
  renderLedger();
}

document.getElementById('btn-register-yayoi').addEventListener('click', showConfirmModal);
document.getElementById('confirm-overlay').addEventListener('click', e => {
  if (e.target.id === 'confirm-overlay') closeConfirmModal();
});

// ============================================================
// 初期描画
// ============================================================
setFilter('all');
renderLedger();
</script>
